name: Test and Build

on: [workflow_dispatch]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Verification des fichiers du runner (linux)
        run: ls -a -l

      - name: Clone du projet dans le runner (checkout)
        uses: actions/checkout@v6

      - name: Vérification des fichiers après l'action "checkout"
        run: ls -a -l
      
      - name: Installation de l'environnement Node.js
        uses: actions/setup-node@v6
      
      - name: Installatin des dépendances (node_modules)
        run: npm ci

      - name: Lancement des tests unitaires
        run: npm run test

      - name: Buildation du code TS vers JS
        run: npm run build

      - name: Vérifier le résultat de la buildation (projet "Hello World")
        run: npm run start


